<script>
document.addEventListener('DOMContentLoaded', () => {
  const spielerAnzahl = 7;
  const modal = document.createElement('div');
  modal.id = 'ergebnisModal';
  modal.style.position = 'fixed';
  modal.style.top = 0;
  modal.style.left = 0;
  modal.style.width = '100%';
  modal.style.height = '100%';
  modal.style.background = 'rgba(0,0,0,0.5)';
  modal.style.display = 'none';
  modal.style.justifyContent = 'center';
  modal.style.alignItems = 'center';
  modal.style.zIndex = '1000';

  const formContainer = document.createElement('div');
  formContainer.style.background = 'white';
  formContainer.style.padding = '20px';
  formContainer.style.borderRadius = '10px';

  const ergebnisForm = document.createElement('form');
  ergebnisForm.id = 'ergebnisForm';

  for(let i = 1; i <= spielerAnzahl; i++) {
    const label = document.createElement('label');
    label.textContent = `+ Punkte für Spieler ${i}: `;
    const input = document.createElement('input');
    input.type = 'number';
    input.name = `punkte-${i}`;
    input.min = 0;
    input.style.marginRight = '10px';
    label.appendChild(input);
    ergebnisForm.appendChild(label);
    ergebnisForm.appendChild(document.createElement('br'));
  }

  const gewinnerLabel = document.createElement('label');
  gewinnerLabel.textContent = 'Gewinner: ';
  const gewinnerSelect = document.createElement('select');
  gewinnerSelect.name = 'gewinner';
  for(let i = 1; i <= spielerAnzahl; i++) {
    const option = document.createElement('option');
    option.value = i;
    option.textContent = `Spieler ${i}`;
    gewinnerSelect.appendChild(option);
  }
  gewinnerLabel.appendChild(gewinnerSelect);
  ergebnisForm.appendChild(gewinnerLabel);
  ergebnisForm.appendChild(document.createElement('br'));
  ergebnisForm.appendChild(document.createElement('br'));

  const submitButton = document.createElement('button');
  submitButton.type = 'submit';
  submitButton.textContent = 'Speichern';
  ergebnisForm.appendChild(submitButton);

  formContainer.appendChild(ergebnisForm);
  modal.appendChild(formContainer);
  document.body.appendChild(modal);

  // === Punkte addieren statt überschreiben ===
  ergebnisForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const formData = new FormData(ergebnisForm);
    const gewinner = formData.get('gewinner');

    for (let i = 1; i <= spielerAnzahl; i++) {
      const punkteFeld = document.getElementById(`punkte-${i}`);
      const gewinneFeld = document.getElementById(`gewinne-${i}`);

      const punkteAlt = parseInt(punkteFeld.textContent, 10) || 0;
      const punkteNeu = parseInt(formData.get(`punkte-${i}`), 10) || 0;
      punkteFeld.textContent = punkteAlt + punkteNeu;

      if (parseInt(gewinner) === i) {
        const gewinneAlt = parseInt(gewinneFeld.textContent, 10) || 0;
        gewinneFeld.textContent = gewinneAlt + 1;
      }
    }

    modal.style.display = 'none';
    // Tabelle nach Punkten sortieren
    const tbody = document.querySelector('#spielertabelle tbody');
    const rows = Array.from(tbody.querySelectorAll('tr'));

    rows.sort((a, b) => {
      const punkteA = parseInt(a.children[1].textContent, 10) || 0;
      const punkteB = parseInt(b.children[1].textContent, 10) || 0;
      return punkteB - punkteA; // absteigend sortieren
    });

    rows.forEach(row => tbody.appendChild(row));


  });


  // === Öffnen beim Klick auf Button ===
  document.getElementById('spielGespieltBtn').addEventListener('click', () => {
    modal.style.display = 'flex';
  });
});
</script>

<script>
// Joker-Auswahl speichern und wiederherstellen
const gespeicherteJoker = JSON.parse(localStorage.getItem('jokerStatus')) || {};

function toggleJoker(event) {
  const img = event.target;
  const spieler = img.dataset.spieler;
  const joker = img.dataset.joker;
  const key = `s${spieler}j${joker}`;

  if (img.classList.contains('joker-used')) {
    img.classList.remove('joker-used');
    delete gespeicherteJoker[key];
  } else {
    img.classList.add('joker-used');
    gespeicherteJoker[key] = true;
  }

  localStorage.setItem('jokerStatus', JSON.stringify(gespeicherteJoker));
}

function ladeJokerStatus() {
  for (const key in gespeicherteJoker) {
    const img = document.getElementById(`joker-${key}`);
    if (img) {
      img.classList.add('joker-used');
    }
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('#ergebnisseView img[data-joker]').forEach(img => {
    img.style.cursor = 'pointer';
    img.addEventListener('click', toggleJoker);
  });

  ladeJokerStatus();
});

function switchView(view) {
  const ergebnisseView = document.getElementById('ergebnisseView');
  const spieleView = document.getElementById('spieleView');

  if(view === 'ergebnisse') {
    ergebnisseView.style.display = 'block';
    spieleView.style.display = 'none';
  } else if(view === 'spiele') {
    ergebnisseView.style.display = 'none';
    spieleView.style.display = 'block';
  }
}
</script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.spielbild').forEach(img => {
      img.addEventListener('click', () => {
        const name = img.alt;
        const pptPath = `ppts/${name}.pptx`;
        window.open(pptPath, '_blank');
        if (!img.classList.contains('ausgegraut')) {
          img.style.filter = 'grayscale(100%)';
          img.style.opacity = '0.6';
          img.classList.add('ausgegraut');
        }
      });
    });
  });
</script>
